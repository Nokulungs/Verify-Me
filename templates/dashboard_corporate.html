<!DOCTYPE html>
<html>
<head>
    <title>Routing to Secure Gateway...</title>
    <style>
        body { background: #0f110f; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #00f2fe; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="spinner" style="margin: 0 auto 1.5rem auto;"></div>
        <p style="letter-spacing: 0.5px;">Connecting to secure banking parameters...</p>
    </div>

    <form id="payfast-transit-form" action="{{ payfast_url }}" method="POST">
        {% for key, val in data.items() %}
            <input type="hidden" name="{{ key }}" value="{{ val }}">
        {% endfor %}
    </form>

    <script>
        // Trigger execution immediately once DOM structure elements load out completely
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('payfast-transit-form').submit();
        });
    </script>
</body>
</html>
