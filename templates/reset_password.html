<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commit Credentials | VerifyMe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0f0d;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --brand-lime: #4eb637;
            --text-main: #f3f4f6;
            --text-muted: #a3a3a3;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main); display: flex; justify-content: center;
            align-items: center; min-height: 100vh;
        }
        .auth-container {
            width: 100%; max-width: 440px; padding: 2.5rem;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; backdrop-filter: blur(12px); box-sizing: border-box;
        }
        .header h1 { margin: 0; font-size: 1.5rem; font-weight: 600; text-align: center;}
        .header p { margin: 0.5rem 0 2rem 0; color: var(--text-muted); font-size: 0.88rem; text-align: center; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--text-muted); }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-control {
            width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border); border-radius: 6px; color: #fff; font-size: 0.9rem; box-sizing: border-box;
        }
        .input-control:focus { outline: none; border-color: var(--brand-lime); }
        .strength-container { display: flex; gap: 4px; margin-top: 0.5rem; }
        .strength-bar { flex: 1; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; }
        .submit-btn {
            width: 100%; padding: 0.75rem; background: var(--brand-lime); border: none;
            border-radius: 6px; color: #000; font-weight: 600; font-size: 0.9rem; cursor: pointer; margin-top: 1.5rem;
        }
        .flash-messages { margin-bottom: 1.5rem; font-size: 0.85rem; padding: 0.75rem; border-radius: 6px; background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #f87171; text-align: center;}
    </style>
</head>
<body>

<div class="auth-container">
    <div class="header">
        <h1>Establish New Password</h1>
        <p>Define your secure matrix entry password below.</p>
    </div>

    {% with messages = get_flashed_messages(category_filter=["error"]) %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash-messages">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('reset_password', token=token) }}" method="POST">
        <div class="form-group">
            <label for="password">New Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" name="password" class="input-control" required 
                       oninput="checkPasswordStrength(this.value, 'strength-indicator')">
            </div>
            <div class="strength-container" id="strength-indicator">
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
            </div>
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-shield-halved"></i>
                <input type="password" id="confirm_password" name="confirm_password" class="input-control" required>
            </div>
        </div>

        <button type="submit" class="submit-btn">Commit Credentials</button>
    </form>
</div>

<script>
function checkPasswordStrength(password, containerId) {
    const bars = document.querySelectorAll(`#${containerId} > .strength-bar`);
    bars.forEach(bar => bar.style.background = 'rgba(255,255,255,0.1)');
    if (password.length === 0) return;

    let points = 0;
    if (password.length >= 6) points++;
    if (/[A-Z]/.test(password) && /[0-9]/.test(password)) points++;
    if (/[^A-Za-z0-9]/.test(password)) points++;

    if (points >= 1) bars[0].style.background = '#ff4a4a';
    if (points >= 2) bars[1].style.background = '#f59e0b';
    if (points >= 3) bars[2].style.background = '#4eb637';
}
</script>
</body>
</html>
