<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Access | VerifyMe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0f0d;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --brand-lime: #4eb637;
            --text-main: #f3f4f6;
            --text-muted: #a3a3a3;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main); display: flex; justify-content: center;
            align-items: center; min-height: 100vh;
        }
        .auth-container {
            width: 100%; max-width: 440px; padding: 2.5rem;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; backdrop-filter: blur(12px); box-sizing: border-box;
        }
        .header h1 { margin: 0; font-size: 1.5rem; font-weight: 600; text-align: center;}
        .header p { margin: 0.5rem 0 2rem 0; color: var(--text-muted); font-size: 0.88rem; text-align: center; line-height: 1.5; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--text-muted); }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-control {
            width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border); border-radius: 6px; color: #fff; font-size: 0.9rem; box-sizing: border-box;
        }
        .input-control:focus { outline: none; border-color: var(--brand-lime); }
        .submit-btn {
            width: 100%; padding: 0.75rem; background: var(--brand-lime); border: none;
            border-radius: 6px; color: #000; font-weight: 600; font-size: 0.9rem;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 1.5rem;
        }
        .flash-messages { margin-bottom: 1.5rem; font-size: 0.85rem; padding: 0.75rem; border-radius: 6px; line-height: 1.4; word-break: break-all; }
        .flash-success { background: rgba(78, 182, 55, 0.15); border: 1px solid var(--brand-lime); color: #6be052; }
        .flash-error { background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #f87171; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="header">
        <h1>Forgot Password</h1>
        <p>Enter your enterprise email node to generate an authenticated recovery sequence.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-messages flash-{{ 'success' if category == 'success' else 'error' }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('forgot_password') }}" method="POST">
        <div class="form-group">
            <label for="email">Account Email</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" name="email" class="input-control" placeholder="name@company.com" required>
            </div>
        </div>
        <button type="submit" class="submit-btn">
            Deploy Recovery Link <i class="fa-solid fa-paper-plane"></i>
        </button>
    </form>
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem;">
        <a href="{{ url_for('login') }}" style="color: var(--brand-lime); text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> Return to Login</a>
    </div>
</div>

</body>
</html>
